# social-cli credential manifest. Loaded by mimir's cred-verify
# discovery walker when this skill is installed under
# ``<home>/.mimir_builtin_skills/social-cli/`` or ``<home>/skills/social-cli/``.

credentials:
  - name: X_OAUTH
    cred_type: D
    env_vars: [X_API_KEY, X_API_SECRET, X_ACCESS_TOKEN, X_ACCESS_TOKEN_SECRET]
    description: "X OAuth 1.0a — all 4 vars required (partial rotation breaks signing)"
    probe:
      kind: all_env_set
      note: "live: ``social-cli whoami -p x``"

  - name: BSKY_APP_PASSWORD
    cred_type: D
    # social-cli accepts either env name; the format probe targets
    # ATPROTO_APP_PASSWORD (the canonical name in social-cli) and the
    # operator's compose.env normalizes to that. Listed both here for
    # documentation completeness.
    env_vars: [ATPROTO_APP_PASSWORD, BSKY_APP_PASSWORD]
    description: "Bluesky app password (xxxx-xxxx-xxxx-xxxx format)"
    probe:
      kind: python
      script: probe_bsky_password.py
