[project]
name = "mimir-langchain-claude-code"
version = "0.1.0"
description = "Controlled Mimir distribution target for the langchain_claude_code adapter"
requires-python = ">=3.11"
dependencies = [
    "langchain-claude-code>=0.1.0,<0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mimir_langchain_claude_code"]
