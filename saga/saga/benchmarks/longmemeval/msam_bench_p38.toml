# MSAM config — P38 variant (confidence-gated HyDE).
# Same as msam_bench.toml (canonical P30v3 mechanism) EXCEPT
# [retrieval] enable_hyde = true with trigger 0.45. The bench passes
# no `context`, so the contextual-rewrite path is irrelevant — this
# isolates HyDE's contribution.
# See NEXT-EXPERIMENTS.md P38.

[embedding]
provider = "openai"
url = "https://api.openai.com/v1/embeddings"
model = "text-embedding-3-small"
dimensions = 1536
max_input_chars = 8000
timeout_seconds = 30
batch_size = 256
api_key_env = "OPENAI_API_KEY"

[storage]
db_path = "msam.db"
metrics_db_path = "msam_metrics.db"
token_budget_ceiling = 100000000
auto_compact_threshold_pct = 99
refuse_threshold_pct = 100
db_busy_timeout_ms = 5000

[retrieval]
default_top_k = 20
semantic_weight = 0.7
fusion = "rrf"
rrf_k = 60
rrf_semantic_weight = 1.0
rrf_keyword_weight = 1.0
rrf_hyde_weight = 1.0
two_tier_enabled = true
observations_top_k = 5
observation_confidence_min_sim = 0.30
evidence_boost_cap_multiplier = 3.0
enable_graph_pathway = false
enable_observation_bonus = false
similarity_threshold = 0.15
sigmoid_midpoint = 0.35
sigmoid_steepness = 15.0
base_activation_cap = 3.0
quality_threshold = 0.0
confidence_sim_high = 0.45
confidence_sim_medium = 0.30
confidence_sim_low = 0.10
confidence_score_high = 40.0
confidence_score_medium = 10.0
context_quality_floor = 0.0
mmr_lambda = 0.7
keyword_top_k = 20
spreading_activation_enabled = false
temporal_recency_hours = 24
outcome_weight = 0.0
outcome_decay = 1.0
# P38: confidence-gated HyDE. Fires only when first-pass max similarity
# is below 0.45 AND the query is question-shaped. Adds an extra
# semantic pathway from a hypothetical answer; RRF-fused with the
# original passes. P33 analysis predicts ~33% gate-trip rate.
enable_hyde = true
hyde_trigger_confidence = 0.45

[retrieval_v2]
enable_rerank = false
enabled = false
enable_query_rewriting = false
enable_query_expansion = false
enable_quality_filter = false
# HyDE LLM: fast/cheap model so the gate-fire cost stays small.
# resolve_llm_config('retrieval_v2') reads these before falling back
# to [llm]. gpt-5.4-nano is the same model the bench uses for
# consolidation — already exercised, plenty fast for 1-2 sentence
# answer-shape generation.
llm_url = "https://api.openai.com/v1/chat/completions"
llm_model = "gpt-5.4-nano"
api_key_env = "OPENAI_API_KEY"
timeout_seconds = 30

[llm]
url             = "https://openrouter.ai/api/v1/chat/completions"
model           = "openai/gpt-oss-120b"
api_key_env     = "OPENROUTER_API_KEY"
timeout_seconds = 60

[compression]
enable_subatom = false
enable_fact_dedup = false
enable_synthesis = false

[triples]
enable_extraction = false

[annotation]
use_llm = false

[prediction]
enabled = false

[world_model]
enabled = false

[sycophancy]
enabled = false

[decay]
enabled = false

[consolidation]
enabled = true
enable_llm = true
llm_url = "https://api.openai.com/v1/chat/completions"
llm_model = "gpt-5.4-nano"
timeout_seconds = 30
api_key_env = "OPENAI_API_KEY"
min_cluster_size = 3
max_clusters_per_run = 20
stability_reduction_factor = 0.5

[atoms]
auto_resolve_supersedes_on_write = false

[benchmark]
enable_session_boundaries = false
enable_mark_contributions = false

[agents]
default_agent_id = "longmemeval"
