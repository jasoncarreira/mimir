name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least-privilege at the workflow level. First workflow in the repo →
# sets the template for everything that follows; explicit minimal scope
# is the right default. Individual jobs can opt UP if needed.
permissions:
  contents: read

# Cancel in-flight runs for the same ref when a new commit lands. Saves
# minutes on PR force-pushes; main-branch runs use ref=refs/heads/main
# so cancel-in-progress only fires on PR events.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  skill-conformance:
    # Fast gate (<1s of pytest work). Surfaces a single status check
    # SKILL-authors can grep for on a PR. Closes the body-vs-declared
    # ``allowed-tools`` drift gap that pre-beta review flagged
    # (chainlink #82 sub #88). Runs first so the slower pytest matrix
    # below can fail-fast on conformance breaks via ``needs:``.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          # Pin to a known-good minor — ``latest`` is a slow-motion
          # supply-chain risk + a reproducibility hole. Bump
          # deliberately with a code review, not silently.
          version: "0.11.12"
          # Cache uv's resolver state keyed on the lockfile. Heavy
          # deps (fastembed/faiss-cpu/aiohttp) reinstall on every run
          # without this — the 4m32s install time on the cold 3.12
          # run was almost entirely pip work.
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies (with dev extras)
        # ``--extra dev`` is required — plain ``uv sync`` skips
        # pytest-aiohttp (declared under [project.optional-dependencies].dev
        # in pyproject.toml) and other dev-only deps, which produces
        # cascading ``fixture 'aiohttp_server' not found`` errors.
        run: uv sync --extra dev

      - name: Skill conformance + catalog tests
        run: uv run pytest tests/test_skill_conformance.py tests/test_skill_catalog.py -v

  pytest:
    # Full mimir test suite under py 3.11 + 3.12 matrix. ``needs:
    # skill-conformance`` makes the fast gate fail-fast PRs that bust
    # frontmatter, instead of waiting for the slower full matrix to
    # come back red on the same root cause.
    needs: skill-conformance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (with dev extras)
        # ``--extra dev`` is required — see skill-conformance job's
        # comment for the rationale.
        run: uv sync --extra dev

      - name: Run mimir test suite
        # ``testpaths`` is set in pyproject.toml so no explicit path
        # arg needed. Excludes saga/saga/tests/ (workspace member's
        # nested test tree) and the mimir/optional-skills/ test trees
        # (each needs its own skill-dir conftest, and they collide on the
        # shared ``poller`` / ``tests.conftest`` module names). saga has
        # its own conftest; the optional-skills trees run in the dedicated
        # per-skill step below (chainlink #299).
        run: uv run pytest -q --tb=short

      - name: Run optional-skills tests (per-skill, isolated)
        # Each optional skill under mimir/optional-skills/ ships its own
        # poller.py + tests/conftest.py. Run together they collide
        # (ImportPathMismatchError on the shared ``tests.conftest`` module
        # name, plus duplicate ``poller`` modules), which is why the main
        # suite excludes them. Run each skill's tests in its OWN pytest
        # process so sys.modules starts fresh per skill. (chainlink #299)
        run: |
          set -e
          for tdir in mimir/optional-skills/*/tests; do
            if [ -d "$tdir" ]; then
              echo "== $tdir =="
              uv run pytest -q "$tdir"
            fi
          done
