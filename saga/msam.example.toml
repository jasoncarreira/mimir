# MSAM Configuration
# Copy to msam.toml and adjust for your deployment.

[embedding]
provider = "nvidia-nim"                     # nvidia-nim | openai | onnx | local
url = "https://integrate.api.nvidia.com/v1/embeddings"
model = "nvidia/nv-embedqa-e5-v5"
dimensions = 1024
max_input_chars = 2000                      # truncate input beyond this
timeout_seconds = 10
batch_size = 50                                # max texts per API batch request
# api_key_env = "NVIDIA_NIM_API_KEY"        # env var name for API key (provider-specific default)

# ONNX Runtime (local, no API key, lightweight):
# [embedding]
# provider = "onnx"
# model = "BAAI/bge-small-en-v1.5"         # auto-downloads from HuggingFace
# dimensions = 384

[storage]
db_path = "db/msam.db"                      # relative to msam/ directory
metrics_db_path = "db/msam_metrics.db"
token_budget_ceiling = 40000                # max tokens across all active atoms
auto_compact_threshold_pct = 85             # above this: force lightweight profile on new atoms
refuse_threshold_pct = 95                   # above this: reject new atoms entirely
db_busy_timeout_ms = 5000                    # SQLite busy timeout in milliseconds

[retrieval]
default_top_k = 12                          # atoms returned per query
semantic_weight = 0.7                       # vs keyword (0.3)
similarity_threshold = 0.2                  # below this: cosine similarity contributes zero
sigmoid_midpoint = 0.35                     # similarity sigmoid curve center
sigmoid_steepness = 15.0                    # similarity sigmoid sharpness
base_activation_cap = 3.0                   # max base activation (prevents frequency dominance)
quality_threshold = 2.0                     # minimum activation for hybrid retrieval
confidence_sim_high = 0.45                  # similarity above this: high confidence tier
confidence_sim_medium = 0.30                # similarity above this: medium confidence tier
confidence_sim_low = 0.15                   # similarity above this: low confidence tier
confidence_score_high = 40.0                # activation above this: high confidence
confidence_score_medium = 10.0              # activation above this: medium confidence
context_quality_floor = 0.15                # below this: atom rejected from context injection
mmr_lambda = 0.7                            # diversity vs relevance tradeoff (1.0 = pure relevance)
keyword_top_k = 10                          # max FTS5 results
spreading_activation_enabled = true         # enable co-retrieval spreading activation
max_spread_hops = 2                         # max hops for spreading activation
spread_decay_factor = 0.3                   # decay per hop
temporal_recency_hours = 24                 # hours to consider "recent" for temporal queries

[decay]
active_to_fading_threshold = 0.3            # retrievability R below this: active -> fading
fading_to_dormant_threshold = 0.1           # retrievability R below this: fading -> dormant
confidence_decay_rate = 0.01                # per day, after grace period
confidence_decay_grace_days = 7             # days before confidence starts decaying
confidence_floor = 0.1                      # minimum confidence value
stability_dampen_factor = 0.9               # applied to over-retrieved low-value atoms
stability_boost_factor = 1.1                # applied to high-contribution atoms
max_stability = 10.0                         # cap on stability value (prevents runaway)
protection_days = 7                          # never transition atoms accessed within N days
compaction_full_min_age_days = 7             # min age before full -> standard compaction
compaction_full_max_access = 3               # max access count for full -> standard compaction
compaction_standard_min_age_days = 14        # min age before standard -> lightweight compaction
compaction_standard_max_access = 2           # max access count for standard -> lightweight
compaction_trigger_ratio = 1.5               # only compact if content > target * ratio
profile_target_lightweight_chars = 90        # target chars for lightweight profile (~22 tokens)
profile_target_standard_chars = 240          # target chars for standard profile (~60 tokens)

[working_memory]
default_ttl_minutes = 120                   # session atom lifespan
promotion_threshold = 3                     # access count to promote working -> episodic
default_profile = "lightweight"             # working memory always uses this profile

[atoms]
default_profile = "standard"                # lightweight | standard | full
profile_lightweight_max_words = 20           # word count threshold: below = lightweight
profile_full_min_words = 80                  # word count threshold: above = full
default_encoding_confidence = 0.7
default_arousal = 0.5
default_valence = 0.0

[merge]
similarity_threshold = 0.85                 # cosine similarity to suggest merge
max_candidates = 20

[negative_knowledge]
default_ttl_hours = 168                     # 7 days

[emotional_context]
urgency_recency_bonus = 1.0                 # bonus for recent atoms when urgency is high
negative_valence_support_bonus = 0.5        # bonus for supportive atoms when valence is negative
low_arousal_depth_bonus = 0.5               # bonus for philosophical atoms when arousal is low
high_arousal_recent_bonus = 0.3             # bonus for recent atoms when arousal is high

[relations]
supersedes_demotion = 2.0                   # activation penalty for superseded atoms
supports_bonus = 0.5                        # activation bonus for supported atoms

[vector_index]
approx_threshold = 50000                     # switch from exact to approximate FAISS at this atom count

[consolidation]
similarity_threshold = 0.80                 # cosine similarity to group atoms
min_cluster_size = 3                        # minimum atoms to form a cluster
max_clusters_per_run = 50                   # cap clusters per consolidation run
stability_reduction_factor = 0.5            # stability reduction for merged atoms

[annotation]
llm_url = "https://integrate.api.nvidia.com/v1/chat/completions"
llm_model = "mistralai/mistral-large-3-675b-instruct-2512"
timeout_seconds = 15

[comparison]
# Flat-file baselines for token savings measurement.
# Lists of markdown file paths used to compute "tokens saved vs flat files".
startup_files = []    # Files loaded at session startup (identity, preferences, etc.)
query_files = []      # Files loaded per query (topic-specific context files)

[triples]
llm_url = "https://integrate.api.nvidia.com/v1/chat/completions"
llm_model = "mistralai/mistral-large-3-675b-instruct-2512"

[compression]
enable_subatom = true                       # sentence-level extraction from atoms
enable_fact_dedup = true                    # semantic deduplication of sentences
enable_synthesis = false                    # LLM-based sentence compression (off by default)
subatom_token_budget = 120                  # max tokens for subatom output
subatom_section_budget = 30                 # token budget per context section
sentence_similarity_threshold = 0.25        # min similarity for a sentence vs query
dedup_similarity_threshold = 0.85           # cosine threshold for near-duplicate removal
synthesis_max_tokens = 30                   # max tokens for LLM synthesis output
synthesis_model = "mistralai/mistral-large-3-675b-instruct-2512"

[prediction]
temporal_weight = 0.4                       # weight for time-of-day patterns
coretrieval_weight = 0.4                    # weight for co-retrieval patterns
momentum_weight = 0.2                       # weight for topic momentum
lookback_days = 30                          # how far back to analyze patterns
min_confidence = 0.3                        # minimum confidence for predictions

[agents]
default_agent_id = "default"                # agent ID when none specified
enable_sharing = true                       # allow atom sharing between agents

[retrieval_v2]
enabled = true
enable_beam_search = "auto"                 # "auto" | true | false -- auto gates on atom count
beam_search_atom_threshold = 10000          # beam search activates above this many atoms
beam_width = 3                              # number of retrieval beams when active
enable_rewrite = true                       # query rewriting (entity resolution, synonyms)
enable_query_expansion = true               # synonym expansion
enable_triple_augment = true                # augment results with triple traversal
enable_entity_roles = true                  # entity-aware scoring
enable_quality_filter = true                # filter low-quality results
enable_temporal = true                      # temporal query detection
enable_rerank = false                       # LLM rerank (adds ~1s latency, off by default)
enable_feedback = true                      # contribution-based adjustments

[entity_resolution]
# Alias mappings: alternate names -> canonical name
# Remove or replace these with your own entities
[entity_resolution.aliases]
# Map alternate names to canonical names for query rewriting
# "nickname" = "canonical_name"
# "bob" = "robert"
# "the boss" = "robert"

[query_expansion]
# Synonym groups for query rewriting
# "term" = ["synonym1", "synonym2"]
[query_expansion.synonyms]
# Expand query terms with synonyms for better recall
# "profession" = ["job", "career", "work", "occupation"]
# "home" = ["hometown", "residence", "where lives"]
# "schedule" = ["routine", "calendar", "plan"]

[predictive_retrieval]
# Context keys for predict_needed_atoms()
# Remove or replace with your own context
user_active = false                         # whether primary user is present

[context]
default_token_budget = 500                  # token budget for query/hybrid commands
default_top_k = 10                          # default atoms for query command
probe_token_budget = 200                    # token budget for snapshot probe queries
probe_top_k = 5                             # atoms for startup context and probe queries
# Startup context queries (customize for your agent's identity)
startup_identity_query = "agent identity core traits personality"
startup_user_query = "user preferences relationship current situation"
startup_recent_query = "what happened today recent activity"
startup_emotional_query = "emotional state mood current feeling"
# Snapshot probe queries (keep metrics fresh between sessions)
probe_queries = ["current situation schedule", "identity personality traits"]
probe_atom_queries = ["What is the user's profession?", "Who is the agent?"]

[api]
port = 3001
host = "127.0.0.1"                          # localhost only by default

[metrics]
enabled = true
log_access_events = true
log_emotional_state = true
hybrid_probe_on_snapshot = true             # run probe queries during snapshot to keep metrics fresh
default_emotional_intensity = 0.5           # fallback when emotional state file can't be parsed
default_emotional_warmth = 0.5
continuity_history_limit = 100              # rows for system history queries
retrieval_history_limit = 100               # rows for retrieval history queries
