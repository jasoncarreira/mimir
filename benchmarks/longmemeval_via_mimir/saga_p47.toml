# Integration bench: P30 canonical + consolidation-pass-v2 (P47 bundle).
#
# This is the consolidation-side counterpart to saga_p40.toml. P47
# bundles three changes that all touch the consolidation pass:
#
#   - P17: trend writer (consolidation labels each new observation
#     improving / stable / weakening / stale based on access-log decay
#     of its source atoms; activates the previously-no-op trend
#     multipliers in saga.core retrieval).
#   - P35-contradictions: CONTRADICTIONS section in the consolidation
#     prompt; LLM flags within-cluster disagreements; surfaced in the
#     consolidate response for downstream P25 audit.
#   - P45 extension: trend field on get_most_retrieved output + filter.
#     (Doesn't affect bench scoring directly — only the reflection skill
#     consumes it; included because it's part of the same PR.)
#
# All three are off by config gates that don't exist (they're behaviors
# baked into consolidation prompt + persistence). The only flag below
# that differs from saga_p30.toml is none — but consolidation now writes
# trend automatically AND the prompt emits CONTRADICTIONS. So the
# integration test of P47 is "run the full bench with the new
# consolidation behavior and see if observation retrieval scoring (with
# now-active trend multipliers) shifts the result."
#
# Pair config: saga_p30.toml.

[storage]
db_path = "saga.db"
metrics_db_path = "saga_metrics.db"
token_budget_ceiling = 100000000
auto_compact_threshold_pct = 99
refuse_threshold_pct = 100
db_busy_timeout_ms = 5000

[embedding]
provider = "openai"
url = "https://api.openai.com/v1/embeddings"
model = "text-embedding-3-small"
dimensions = 1536
api_key_env = "OPENAI_API_KEY"

[llm]
provider = "openai_compat"
url = "https://api.openai.com/v1/chat/completions"
model = "gpt-5.4-nano"
api_key_env = "OPENAI_API_KEY"
timeout_seconds = 120

[retrieval]
enable_contextual_rewrite = true
two_tier_enabled = true
enable_missing_ref_pivot = true
enable_confidence_gating = true
default_min_confidence_tier = "low"
enable_triple_augment_v2 = false
enable_subatom_beam = false

[retrieval_v2]
enable_query_expansion = true

[triples]
enable_extraction = true

[consolidation]
enabled = true
enable_llm = true

[benchmark]
enable_session_boundaries = false
enable_mark_contributions = false

[compression]
enable_subatom = false
enable_fact_dedup = false
enable_synthesis = false

[annotation]
use_llm = false

[prediction]
enabled = false

[world_model]
enabled = false

[decay]
enabled = false

[atoms]
auto_resolve_supersedes_on_write = false

[server]
api_key = ""
