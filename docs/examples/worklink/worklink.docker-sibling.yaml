# Worklink config (`<home>/worklink.yaml`) wired for the docker-sibling rail —
# chainlink #539. A complete, loadable example: use it as-is, or merge the
# `compute_backends` stanza + a route into your existing worklink.yaml.
#
# Validated by tests/test_worklink_example_configs.py against WorklinkConfig.load.

defaults:
  backend: codex
  # Default execution substrate. docker_sibling routes every run through the
  # out-of-container broker (the autonomous-isolation posture, #460/#537). Keep
  # local_subprocess only as an explicit, operator-accepted fallback — it runs
  # model code INSIDE the agent container and autonomous dispatch refuses it
  # unless allow_autonomous_local_subprocess is set.
  compute_backend: docker_sibling
  timeout_s: 1800
  priority: normal
  test_command: "env -u MIMIR_MODEL_SPEC uv run pytest -q"
  base_branch: main

backends:
  codex:
    bin: codex
    args: ["exec", "--json", "--sandbox", "danger-full-access"]
  claude_cli:
    bin: claude
    args: ["-p", "--output-format", "json"]

compute_backends:
  # `docker-sibling` and `docker_sibling` are equivalent (names are normalized).
  docker-sibling:
    # unix:// socket the agent container can reach, or http(s):// for a TCP broker.
    broker_url: "unix:///run/worklink-broker.sock"
    # Must be in the broker policy's allowed_images.
    image: mimir-worklink:latest
    # Per-launch request hints; the broker reconciles them against its own policy
    # (it never widens the broker's trust boundary).
    policy:
      network: none

# Optional: pin specific work to a substrate by label/repo. Without routes,
# defaults.compute_backend applies to everything.
routes:
  # Frontend build work (#524 tree) runs isolated through the broker.
  - label: react
    backend: codex
    compute_backend: docker_sibling
