# A/B probes for chainlink #140 (Sub B of #138).
#
# 30 hand-curated probes. First 15 are verbatim from
# state/spec/chainlink-138-sub-b-recon.md §"Probe set draft". The next
# 15 are additions chosen to make the shape distribution roughly even
# across the full 30 (target ~7-8 of each shape per the spawn brief).
#
# Final per-shape counts (full 30):
#   fingerprinted-error: 8  (probes 1, 2, 3, 14, 16, 17, 18, 19)
#   concept-lookup:      8  (probes 4, 5, 6, 8, 13, 15, 20, 21)
#   recent-decision:     7  (probes 7, 9, 10, 22, 23, 24, 25)
#   procedural:          7  (probes 11, 12, 26, 27, 28, 29, 30)
#
# Schema (each entry):
#   text             — exact user-message phrasing (verbatim is the point)
#   expected_target  — file path or path fragment (case-insensitive
#                      substring match against the reply text)
#   shape            — one of fingerprinted-error/concept-lookup/recent-decision/procedural
#
# Operator should review before the end-to-end run fires.

