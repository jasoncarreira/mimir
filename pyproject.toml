[project]
name = "mimir"
version = "0.1.0"
description = "Memory-centric agent harness on the Claude Agent SDK"
requires-python = ">=3.11"
authors = [{ name = "jcarreira" }]
license = { text = "MIT" }

dependencies = [
    "claude-agent-sdk>=0.1.58",
    "aiohttp>=3.12",
    "apscheduler>=3.11",
    "python-dotenv>=1.0",
    "pyyaml>=6.0",
    "fastembed>=0.4",
    # v0.5 §2: saga is the in-process memory backend. Workspace member;
    # editable-installed via [tool.uv.sources] below.
    "saga",
    "deepagents>=0.6.1",
    "langchain-openai>=1.2.1",
    "langchain-claude-code>=0.1.0",
]

[project.optional-dependencies]
discord = [
    "discord-py>=2.6",
]
slack = [
    "slack-bolt>=1.18",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-aiohttp>=1.0",
    "discord-py>=2.6",
    "slack-bolt>=1.18",
]

[project.scripts]
mimir = "mimir.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mimir"]

[tool.hatch.build]
include = [
    "mimir/**/*.py",
    "mimir/prompts/**/*.md",
    "mimir/skills/**/*.md",
    "mimir/skills/**/*.json",
    "mimir/skills/**/*.py",
    "mimir/templates/**/*",
    "mimir/turn_viewer.html",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

# v0.5: workspace setup. Mimir's pyproject is also the workspace root;
# saga/ is the second member (imported via filter-repo from msam2 — see
# V0.5.md §1). The package inside saga/ is still named ``msam`` at this
# commit; renamed to ``saga`` in V0.5.md §6.
[tool.uv.workspace]
members = ["saga"]

# Resolve the ``saga`` dependency declared in [project.dependencies]
# from the workspace member rather than PyPI. uv installs it editable so
# saga.core / saga.benchmarks are importable from anywhere in the workspace.
[tool.uv.sources]
saga = { workspace = true }
