# Worklink docker-sibling BROKER policy (template) — chainlink #539.
#
# This is the trust boundary. The broker runs OUTSIDE the agent container with
# the Docker socket mounted only there; it turns an agent job request into a
# narrow `docker run` derived entirely from THIS static, operator-owned file.
# The agent cannot submit raw docker flags, host mounts, --privileged, arbitrary
# env, or arbitrary network mode — only an allowed image + a policy-bounded run.
#
# Copy to a root-owned path the agent CANNOT write (e.g. /etc/mimir/), `chmod 600`
# if it carries secrets, then start the broker:
#
#   uv run mimir worklink docker-broker \
#     --policy /etc/mimir/worklink-docker-broker.yaml \
#     --socket /run/worklink-broker.sock
#
# Validated by tests/test_worklink_example_configs.py against DockerBrokerPolicy.

# Images the broker is allowed to launch. The agent's requested image must be in
# this list or the job is refused. Pin a digest in production.
allowed_images:
  - mimir-worklink:latest

# Container network. Only `none` and `bridge` are accepted; `host` is refused.
# Keep `none` unless a specific leaf genuinely needs network egress.
network: none

# Hard ceiling on per-job wall-clock; a job request can ask for less, never more.
max_timeout_s: 1800

# The ONLY env var names that may ever reach a worker container.
env_allowlist:
  - GITHUB_TOKEN
  - MIMIR_HOME

# Values injected into every worker container. Only keys listed here are actually
# passed through (the broker emits `--env <KEY>`); the value is taken from this
# file merged over the broker process's own environment. Every key must also be
# in env_allowlist. This file is operator-owned — keep real tokens out of git and
# the file root-only.
default_env:
  GITHUB_TOKEN: "ghp_replace_with_a_scoped_worklink_token"
  MIMIR_HOME: "/worklink/home"

# Optional: override the in-container command. Defaults to the portable worker
# entrypoint, which is almost always what you want — leave it unset.
# worker_command: ["mimir", "worklink", "worker", "--payload-json"]
