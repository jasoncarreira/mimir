[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "msam"
version = "2026.02.24"
description = "Multi-Stream Adaptive Memory -- cognitive memory system for AI agents"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    {name = "Jaden Schwab"},
]
keywords = ["memory", "ai", "agents", "cognitive-architecture", "knowledge-graph"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "pydantic>=2.5",
    "requests>=2.31",
    "numpy>=1.24",
    "faiss-cpu>=1.7",
]

[project.optional-dependencies]
grafana = [
    "flask>=3.0",
    "flask-cors>=4.0",
]
onnx = [
    "onnxruntime>=1.16",
    "tokenizers>=0.15",
]
local = [
    "sentence-transformers>=2.2",
]
dev = [
    "pytest>=8.0",
    "pytest-cov",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://github.com/jadenschwab/msam"
Documentation = "https://github.com/jadenschwab/msam/blob/main/SPEC.md"
Issues = "https://github.com/jadenschwab/msam/issues"

[project.scripts]
msam = "msam.remember:main"

[tool.setuptools.packages.find]
include = ["msam*"]

[tool.setuptools.package-data]
msam = ["scripts/*"]
