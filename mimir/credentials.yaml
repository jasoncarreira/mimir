# mimir-core credential manifest. Sibling to mimir/cred_verify.py; the
# framework loads this at package import via the cred-verify discovery
# walker (SPEC §16 item 14, Phase 2.5).
#
# Per-skill credentials live under <home>/.mimir_builtin_skills/<skill>/
# and <home>/skills/<skill>/. Only credentials owned by the mimir core
# (the framework process itself, the bridges, the model client) belong
# here.

credentials:
  # ─── Model provider ──────────────────────────────────────────────
  - name: ANTHROPIC_API_KEY
    cred_type: D
    env_vars: [ANTHROPIC_API_KEY]
    description: "Anthropic API key (format-check only — live call deferred to first turn)"
    probe:
      kind: format
      env: ANTHROPIC_API_KEY
      prefix: "sk-ant-"
      min_len: 20

  # ─── Mimir's own HTTP-server gate ───────────────────────────────
  - name: MIMIR_API_KEY
    cred_type: D
    env_vars: [MIMIR_API_KEY]
    description: "Mimir's own HTTP server auth gate (operator-chosen, format-check only)"
    probe:
      kind: format
      env: MIMIR_API_KEY
      min_len: 16

  # ─── Git push to state repo ─────────────────────────────────────
  - name: GITHUB_TOKEN
    cred_type: A
    env_vars: [GITHUB_TOKEN]
    description: "GitHub PAT (gh CLI + git push to state repo)"
    probe:
      kind: subprocess
      binary: gh
      cmd: [gh, auth, status]

  # ─── Embedding providers (only one active per deployment) ────────
  - name: VOYAGE_API_KEY
    cred_type: D
    env_vars: [VOYAGE_API_KEY]
    description: "Voyage AI embeddings (format-check only)"
    probe:
      kind: format
      env: VOYAGE_API_KEY
      prefix: "pa-"
      min_len: 20

  - name: OPENAI_API_KEY
    cred_type: D
    env_vars: [OPENAI_API_KEY]
    description: "OpenAI embeddings (format-check only)"
    probe:
      kind: format
      env: OPENAI_API_KEY
      prefix: "sk-"
      # ``sk-ant-`` is also a valid ``sk-`` prefix; reject explicitly
      # so an Anthropic key dropped into OPENAI_API_KEY by mistake
      # surfaces here rather than at first use.
      disallowed_prefix: "sk-ant-"
      min_len: 20

  # ─── Web search ──────────────────────────────────────────────────
  - name: TAVILY_API_KEY
    cred_type: D
    env_vars: [TAVILY_API_KEY]
    description: "Tavily web-search API key (format-check only)"
    probe:
      kind: format
      env: TAVILY_API_KEY
      prefix: "tvly-"
      min_len: 20

  # ─── Bridges (Type B — Phase 3 wires live probes) ────────────────
  - name: DISCORD_TOKEN
    cred_type: B
    env_vars: [DISCORD_TOKEN]
    description: "Discord bridge bot token"
    probe:
      kind: not_implemented

  - name: SLACK_TOKENS
    cred_type: B
    env_vars: [SLACK_BOT_TOKEN, SLACK_APP_TOKEN]
    description: "Slack bridge bot + app tokens"
    probe:
      kind: not_implemented

  # ─── Claude Max OAuth (Type C — Phase 3 wires live probe) ────────
  - name: CLAUDE_OAUTH
    cred_type: C
    env_vars: [MIMIR_CLAUDE_OAUTH_CREDENTIALS]
    description: "Claude Max OAuth (.credentials.json refresh token)"
    probe:
      kind: not_implemented
