# gmail-poller credential manifest.
#
# Gmail OAuth state lives in the gog keyring file (not env vars).
# Phase 3's live probe will check for the keyring file's presence
# plus a successful ``gog gmail search --max 1`` call; the stub is
# in place so ``mimir verify-creds`` lists this credential rather
# than silently omitting it.

credentials:
  - name: GMAIL_OAUTH
    cred_type: C
    env_vars: []
    description: "Gmail / Google Workspace OAuth (gog keyring, not env)"
    probe:
      kind: not_implemented
