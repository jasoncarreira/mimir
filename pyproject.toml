[project]
name = "mimir"
version = "0.1.0"
description = "Memory-centric agent harness on the Claude Agent SDK"
requires-python = ">=3.11"
authors = [{ name = "jcarreira" }]
license = { text = "MIT" }

dependencies = [
    "claude-agent-sdk>=0.1.58",
    "aiohttp>=3.12",
    "apscheduler>=3.11",
    "python-dotenv>=1.0",
    "pyyaml>=6.0",
    "fastembed>=0.4",
]

[project.optional-dependencies]
discord = [
    "discord-py>=2.6",
]
slack = [
    "slack-bolt>=1.18",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-aiohttp>=1.0",
    "discord-py>=2.6",
    "slack-bolt>=1.18",
]

[project.scripts]
mimir = "mimir.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mimir"]

[tool.hatch.build]
include = [
    "mimir/**/*.py",
    "mimir/prompts/**/*.md",
    "mimir/skills/**/*.md",
    "mimir/skills/**/*.json",
    "mimir/skills/**/*.py",
    "mimir/turn_viewer.html",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
